client_id = "REPLACE_WITH_YOUR_TRUE49_CLIENT_ID"
name = "backorder-ops"
application_url = "https://backorder-ops.onrender.com"
embedded = true

redirect_urls = [
  "https://backorder-ops.onrender.com/auth/callback",
  "https://backorder-ops.onrender.com/auth/shopify/callback"
]

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = [ "app/scopes_update" ]
uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_orders,read_products,read_inventory,read_locations"

[auth]
redirect_urls = [
  "https://backorder-ops.onrender.com/auth/callback",
  "https://backorder-ops.onrender.com/auth/shopify/callback"
]
